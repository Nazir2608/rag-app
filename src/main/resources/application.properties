spring.application.name=spring-ai-ollama
server.port=8081

#advisor config
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=gemma3:4b
spring.ai.ollama.embedding.model=nomic-embed-text:latest
spring.ai.ollama.chat.options.temperature=0.7
spring.ai.ollama.chat.options.top-p=0.9
spring.ai.ollama.chat.options.num-predict=500

logging.level.org.springframework.ai.chat.client.advisor=DEBUG


#spring.ai.chat.memory.repository.jdbc.initialize-schema=ALWAYS

spring.datasource.url=jdbc:mariadb://localhost:3308/springai
spring.datasource.username=root
spring.datasource.password=Maria@123

spring.ai.vectorstore.mariadb.initialize-schema=true
spring.ai.vectorstore.mariadb.distance-type=COSINE
spring.ai.vectorstore.mariadb.dimensions=768
